    <script>
        const questions = [
            {
                id: 1,
                category: "plane",
                tag: "Plane Surfaces",
                question: "A light ray enters a glass slab (\\mu = 1.5) of thickness \\(d\\) at an angle of incidence \\(i\\). If the angle of incidence is small, show that the lateral shift of the ray is approximately \\(d \\cdot i \\left(1 - \\frac{1}{\\mu}\\right)\\).",
                hint: "Lateral shift is given by \\(x = \\frac{d \\sin(i-r)}{\\cos r}\\). For small angles, \\(\\sin \\theta \\approx \\theta\\) and \\(\\cos \\theta \\approx 1\\). Apply Snell's law \\(i \\approx \\mu r\\).",
                solution: "Using the formula for lateral shift:<br>\\(x = \\frac{d \\sin(i-r)}{\\cos r}\\)<br>For small angles, \\(\\cos r \\approx 1\\) and \\(\\sin(i-r) \\approx i-r\\).<br>Thus, \\(x \\approx d(i-r)\\).<br>From Snell's law, for small angles, \\(i = \\mu r \\implies r = i/\\mu\\).<br>Substituting \\(r\\):<br>\\(x \\approx d\\left(i - \\frac{i}{\\mu}\\right) = d \\cdot i \\left(1 - \\frac{1}{\\mu}\\right)\\)."
            },
            {
                id: 2,
                category: "plane",
                tag: "Total Internal Reflection",
                question: "A point source of light is placed at the bottom of a transparent vessel filled with water (\\(\\mu = 4/3\\)) to a height of \\(h = 12\\text{ cm}\\). Find the minimum radius of an opaque disc that should be floated on the surface of the water centered directly above the source to prevent any light from escaping out of the vessel.",
                hint: "Light escapes within a cone defined by the critical angle \\(\\theta_c\\). The radius is related by \\(r = h \\tan\\theta_c\\), where \\(\\sin\\theta_c = 1/\\mu\\).",
                solution: "For TIR to prevent light escape, the disc must cover the circular region where light exits at less than the critical angle.<br>\\(\\sin\\theta_c = \\frac{1}{\\mu} = \\frac{3}{4}\\)<br>\\(\\tan\\theta_c = \\frac{\\sin\\theta_c}{\\cos\\theta_c} = \\frac{3/4}{\\sqrt{1 - (3/4)^2}} = \\frac{3}{\\sqrt{7}}\\)<br>The radius of the disc is:<br>\\(r = h \\tan\\theta_c = 12 \\times \\frac{3}{\\sqrt{7}} = \\frac{36}{\\sqrt{7}}\\text{ cm} \\approx 13.6\\text{ cm}\\)."
            },
            {
                id: 3,
                category: "plane",
                tag: "Total Internal Reflection",
                question: "A rectangular block of glass (\\(\\mu = 1.6\\)) is surrounded by a liquid of refractive index \\(\\mu_l\\). A ray of light is incident at the top surface of the block at an angle of \\(45^\\circ\\). What must be the maximum value of \\(\\mu_l\\) so that the ray suffers total internal reflection at the vertical face of the block?",
                hint: "Find the angle of refraction \\(r\\) at the top face. The angle of incidence at the vertical face is \\(\\theta = 90^\\circ - r\\). Apply the condition for TIR: \\(\\sin\\theta \\ge \\mu_l/\\mu\\).",
                solution: "At the top face: \\(1 \\cdot \\sin 45^\\circ = \\mu \\sin r \\implies \\sin r = \\frac{1}{\\sqrt{2}\\mu}\\).<br>At the vertical face, the angle of incidence is \\(\\theta = 90^\\circ - r\\).<br>For TIR: \\(\\sin \\theta \\ge \\frac{\\mu_l}{\\mu} \\implies \\cos r \\ge \\frac{\\mu_l}{\\mu}\\).<br>Using \\(\\cos r = \\sqrt{1 - \\sin^2 r} = \\sqrt{1 - \\frac{1}{2\\mu^2}}\\):<br>\\(\\sqrt{1 - \\frac{1}{2\\mu^2}} \\ge \\frac{\\mu_l}{\\mu} \\implies \\mu_l \\le \\sqrt{\\mu^2 - 0.5}\\).<br>Substitute \\(\\mu = 1.6\\):<br>\\(\\mu_l \\le \\sqrt{2.56 - 0.5} = \\sqrt{2.06} \\approx 1.435\\).<br>Thus, the maximum value of \\(\\mu_l\\) is approximately \\(1.435\\)."
            },
            {
                id: 4,
                category: "plane",
                tag: "Plane Surfaces",
                question: "An observer looks down vertically at a coin sitting at the bottom of a swimming pool of depth \\(H\\). The pool is filled with two immiscible liquids: the lower half with a liquid of refractive index \\(\\mu_1 = 1.5\\) and the upper half with a liquid of refractive index \\(\\mu_2 = 1.2\\). Find the apparent depth of the coin.",
                hint: "Apparent depth for multiple layers is given by the sum of individual apparent depths: \\(d' = \\sum \\frac{d_i}{\\mu_i}\\).",
                solution: "The thickness of each liquid layer is \\(d_1 = d_2 = H/2\\).<br>Apparent depth \\(d' = \\frac{d_1}{\\mu_1} + \\frac{d_2}{\\mu_2}\\)<br>\\(d' = \\frac{H/2}{1.5} + \\frac{H/2}{1.2} = \\frac{H}{3} + \\frac{H}{2.4} = \\frac{H}{3} + \\frac{5H}{12} = \\frac{9H}{12} = 0.75H\\)."
            },
            {
                id: 5,
                category: "plane",
                tag: "Prism Refraction",
                question: "A ray of light is incident normally on one face of an equilateral glass prism of refractive index \\(\\sqrt{2}\\). Trace the ray and find if it undergoes TIR.",
                hint: "Equilateral prism angle is \\(A = 60^\\circ\\). At normal incidence on the first face, the ray goes undeviated. Calculate the angle of incidence at the second face.",
                solution: "At the first face: normal incidence \\(i_1 = 0 \\implies r_1 = 0\\).<br>The angle of incidence at the second face is \\(r_2 = A - r_1 = 60^\\circ - 0 = 60^\\circ\\).<br>Critical angle for glass-air boundary: \\(\\sin\\theta_c = \\frac{1}{\\mu} = \\frac{1}{\\sqrt{2}} \\implies \\theta_c = 45^\\circ\\).<br>Since the angle of incidence \\(r_2 = 60^\\circ > 45^\\circ\\), the ray undergoes **Total Internal Reflection** at the second face."
            },
            {
                id: 6,
                category: "plane",
                tag: "Total Internal Reflection",
                question: "An optical fiber is made of a core material of refractive index \\(\\mu_1 = 1.5\\) surrounded by a cladding of refractive index \\(\\mu_2 = 1.4\\). What is the maximum angle of incidence \\(i\\) (with the axis of the fiber) at the entrance end so that light propagates along the fiber via total internal reflection?",
                hint: "For TIR at core-cladding boundary, the internal angle of incidence \\(\\theta \\ge \\theta_c = \\sin^{-1}(\\mu_2/\\mu_1)\\). Relate this to the refraction at the entrance face.",
                solution: "Let \\(i\\) be the angle of incidence at the entrance, and \\(r\\) be the angle of refraction.<br>The angle of incidence at the core-cladding boundary is \\(\\theta = 90^\\circ - r\\).<br>For TIR: \\(\\sin\\theta \\ge \\frac{\\mu_2}{\\mu_1} \\implies \\cos r \\ge \\frac{1.4}{1.5} = \\frac{14}{15}\\).<br>\\(\\sin^2 r = 1 - \\cos^2 r \\le 1 - \\left(\\frac{14}{15}\\right)^2 = \\frac{29}{225}\\).<br>From Snell's law at entrance: \\(\\sin i = \\mu_1 \\sin r = 1.5 \\sin r\\).<br>Thus, \\(\\sin^2 i = 2.25 \\sin^2 r \\le 2.25 \\times \\frac{29}{225} = 0.29 \\implies \\sin i \\le \\sqrt{0.29} \\approx 0.5385\\).<br>Therefore, \\(i_{\\text{max}} = \\sin^{-1}(0.5385) \\approx 32.6^\\circ\\)."
            },
            {
                id: 7,
                category: "plane",
                tag: "Plane Surfaces",
                question: "A microscopic particle is embedded at the center of a solid glass sphere of radius \\(R = 6\\text{ cm}\\) and refractive index \\(\\mu = 1.5\\). From what distance from the surface of the sphere will the particle appear to be situated when viewed from outside?",
                hint: "For any ray originating from the center, the angle of incidence at the spherical surface is zero because it is normal to the surface.",
                solution: "Since the object is at the center of the sphere, all rays from it fall normally on the spherical surface.<br>No refraction/deviation occurs for these rays.<br>Therefore, to an observer outside, the particle appears to be at its actual position, i.e., at the center of the sphere, which is at a distance of \\(6\\text{ cm}\\) from the surface."
            },
            {
                id: 8,
                category: "spherical",
                tag: "Spherical Refraction",
                question: "A point object is placed in air (\\(\\mu = 1.0\\)) at a distance of \\(40\\text{ cm}\\) from the convex spherical surface of a glass rod (\\(\\mu = 1.5\\)). If the radius of curvature of the spherical surface is \\(20\\text{ cm}\\), find the position of the image.",
                hint: "Use the single spherical refracting surface formula: \\(\\frac{\\mu_2}{v} - \\frac{\\mu_1}{u} = \\frac{\\mu_2 - \\mu_1}{R}\\). Watch your signs.",
                solution: "Using the formula: \\(\\frac{\\mu_2}{v} - \\frac{\\mu_1}{u} = \\frac{\\mu_2 - \\mu_1}{R}\\)<br>Given: \\(\\mu_1 = 1.0, \\mu_2 = 1.5, u = -40\\text{ cm}, R = +20\\text{ cm}\\).<br>\\(\\frac{1.5}{v} - \\frac{1}{-40} = \\frac{1.5 - 1.0}{20}\\)<br>\\(\\frac{1.5}{v} + \\frac{1}{40} = \\frac{0.5}{20} = \\frac{1}{40}\\)<br>\\(\\frac{1.5}{v} = 0 \\implies v \\to \\infty\\).<br>The image is formed at infinity (the refracted rays become parallel)."
            },
            {
                id: 9,
                category: "spherical",
                tag: "Spherical Refraction",
                question: "A glass sphere of radius \\(R = 10\\text{ cm}\\) and refractive index \\(\\mu = 1.5\\) contains a small air bubble. When viewed along a diameter, the bubble appears to be at a distance of \\(4\\text{ cm}\\) from the nearest surface. Find the actual distance of the bubble from this surface.",
                hint: "Rays travel from glass to air, so \\(\\mu_1 = 1.5, \\mu_2 = 1.0\\). The virtual image is at \\(v = -4\\text{ cm}\\). Center of curvature is on the object's side, so \\(R\\) is negative.",
                solution: "Using \\(\\frac{\\mu_2}{v} - \\frac{\\mu_1}{u} = \\frac{\\mu_2 - \\mu_1}{R}\\):<br>Here, \\(\\mu_1 = 1.5\\) (glass), \\(\\mu_2 = 1.0\\) (air).<br>\\(v = -4\\text{ cm}\\) (image is virtual, formed on same side), \\(R = -10\\text{ cm}\\) (center is to the left of vertex).<br>\\(\\frac{1.0}{-4} - \\frac{1.5}{u} = \\frac{1.0 - 1.5}{-10}\\)<br>\\(-0.25 - \\frac{1.5}{u} = \\frac{-0.5}{-10} = +0.05\\)<br>\\(-\\frac{1.5}{u} = 0.05 + 0.25 = 0.30\\)<br>\\(u = -\\frac{1.5}{0.30} = -5\\text{ cm}\\).<br>The actual distance of the bubble from the surface is \\(5\\text{ cm}\\)."
            },
            {
                id: 10,
                category: "spherical",
                tag: "Spherical Refraction",
                question: "A parallel beam of light traveling in air is incident on a solid glass sphere of radius \\(R\\) and refractive index \\(\\mu = 1.5\\). Find the position where the beam is focused after refracting through both surfaces of the sphere.",
                hint: "Solve in two steps. First surface: \\(u = -\\infty, R_1 = +R\\). The first image acts as a virtual object for the second surface.",
                solution: "First Surface Refraction:<br>\\(\\mu_1=1, \\mu_2=1.5, u_1=-\\infty, R_1=+R\\).<br>\\(\\frac{1.5}{v_1} - 0 = \\frac{1.5-1}{R} \\implies v_1 = 3R\\) from first vertex.<br>Second Surface Refraction:<br>The image acts as a virtual object. Its distance from the second vertex is \\(u_2 = v_1 - 2R = 3R - 2R = +R\\).<br>Here, \\(\\mu_1 = 1.5, \\mu_2 = 1.0, R_2 = -R\\).<br>\\(\\frac{1.0}{v_2} - \\frac{1.5}{R} = \\frac{1.0 - 1.5}{-R} = \\frac{0.5}{R}\\)<br>\\(\\frac{1.0}{v_2} = \\frac{1.5}{R} + \\frac{0.5}{R} = \\frac{2}{R} \\implies v_2 = R/2\\).<br>The beam is focused at a distance of \\(R/2\\) from the second surface."
            },
            {
                id: 11,
                category: "spherical",
                tag: "Spherical Refraction",
                question: "An object is placed at a distance of \\(12\\text{ cm}\\) from a convex refracting surface of radius of curvature \\(10\\text{ cm}\\) separating air from a medium of refractive index \\(2.0\\). Find the position and nature of the image formed.",
                hint: "Apply the single-surface formula with \\(\\mu_1=1, \\mu_2=2, u=-12\\text{ cm}, R=+10\\text{ cm}\\).",
                solution: "Using the formula: \\(\\frac{\\mu_2}{v} - \\frac{\\mu_1}{u} = \\frac{\\mu_2 - \\mu_1}{R}\\)<br>\\(\\frac{2}{v} - \\frac{1}{-12} = \\frac{2 - 1}{10} = \\frac{1}{10}\\)<br>\\(\\frac{2}{v} + \\frac{1}{12} = \\frac{1}{10} \\implies \\frac{2}{v} = \\frac{1}{10} - \\frac{1}{12} = \\frac{2}{120} = \\frac{1}{60}\\)<br>\\(v = 120\\text{ cm}\\).<br>Since \\(v > 0\\), the image is real, formed inside the second medium at a distance of \\(120\\text{ cm}\\) from the pole."
            },
            {
                id: 12,
                category: "spherical",
                tag: "Spherical Refraction",
                question: "A hollow thin glass sphere of radius \\(R\\) is filled with water (\\(\\mu = 4/3\\)). A parallel beam of light is incident on it. Where will it focus if the refractive index of the thin glass shell is neglected?",

                solution: "Given: \\(f = -20\\text{ cm}, v = -2u\\).<br>Mirror formula: \\(\\frac{1}{v} + \\frac{1}{u} = \\frac{1}{f} \\implies \\frac{1}{-2u} + \\frac{1}{u} = \\frac{1}{-20}\\)<br>\\(\\frac{1}{2u} = -\\frac{1}{20} \\implies 2u = -20 \\implies u = -10\\text{ cm}\\).<br>The object is placed at a distance of \\(10\\text{ cm}\\) in front of the mirror."
            },
            {
                id: 36,
                category: "mirrors",
                tag: "Mirrors",
                question: "A thin rod of length \\(f/3\\) is placed along the principal axis of a concave mirror of focal length \\(f\\) such that its image, which is real and elongated, just touches one end of the rod. Find the magnification of the rod.",
                hint: "For the image to touch the rod, the touch point must be at the center of curvature (\\(u = 2f\\)).",
                solution: "For a concave mirror, the object and image coincide at the Center of Curvature \\(C\\) (distance \\(2f\\)).<br>Since the image is elongated, the rod must lie between \\(C\\) and \\(F\\).<br>One end of the rod is at \\(u_1 = 2f\\), so its image is at \\(v_1 = -2f\\).<br>The other end is at \\(u_2 = 2f - f/3 = 5f/3\\).<br>For this end:<br>\\(\\frac{1}{v_2} + \\frac{3}{-5f} = -\\frac{1}{f} \\implies \\frac{1}{v_2} = -\\frac{1}{f} + \\frac{3}{5f} = -\\frac{2}{5f} \\implies v_2 = -2.5f\\).<br>Length of image: \\(L' = |v_2 - v_1| = 2.5f - 2f = 0.5f\\).<br>Magnification: \\(m = \\frac{L'}{L} = \\frac{0.5f}{f/3} = 1.5\\)."
            },
            {
                id: 37,
                category: "mirrors",
                tag: "Mirror Velocity",
                question: "A passenger in a car looks into the side-view convex mirror (\\(R = 2\\text{ m}\\)). He notices a jogger running towards him. If the jogger is running at a speed of \\(5\\text{ m/s}\\), how fast does the image of the jogger appear to move when the jogger is \\(39\\text{ m}\\) away?",
                hint: "Here, \\(f = R/2 = 1\\text{ m}\\) and \\(u = -39\\text{ m}\\). Use the formula \\(v_I = -\\left(\\frac{f}{u-f}\\right)^2 v_O\\).",
                solution: "For convex mirror: \\(f = +1\\text{ m}\\). Jogger position: \\(u = -39\\text{ m}\\).<br>Velocity relation: \\(v_I = \\left(\\frac{f}{u-f}\\right)^2 v_O\\) (ignoring sign for speed).<br>\\(v_I = \\left(\\frac{1}{-39 - 1}\\right)^2 \\times 5 = \\left(\\frac{1}{-40}\\right)^2 \\times 5 = \\frac{5}{1600} = \\frac{1}{320}\\text{ m/s}\\)."
            },
            {
                id: 38,
                category: "combinations",
                tag: "Layered Lens",
                question: "A lens is made of three horizontal layers of different materials of refractive indices \\(\\mu_1 = 1.4\\), \\(\\mu_2 = 1.5\\), and \\(\\mu_3 = 1.6\\). How many images of a single point object on the principal axis will be formed by this lens?",
                hint: "Each material layer creates a different focal length for light passing through it.",
                solution: "Since the layers are horizontal, light passing through each layer is refracted according to its distinct refractive index.<br>This results in three different focal lengths.<br>Therefore, the lens forms **three** distinct images of a single point object."
            },
            {
                id: 39,
                category: "combinations",
                tag: "Cutting Lenses",
                question: "A convex lens of focal length \\(f = 20\\text{ cm}\\) is cut into two halves along its principal axis. The two halves are separated by a distance of \\(2\\text{ mm}\\) vertically. A point object is placed at a distance of \\(30\\text{ cm}\\) from the lens on the line of symmetry. Find the distance between the two images formed.",
                hint: "The separation of the lens halves shifts the principal axes of the two halves. Find the image positions relative to their shifted axes.",
                solution: "The lens axes are separated by \\(2\\text{ mm}\\). Each half has its own principal axis, separated from the line of symmetry by \\(d = 1\\text{ mm}\\).<br>The object lies on the line of symmetry, which is \\(1\\text{ mm}\\) below the axis of the upper half and \\(1\\text{ mm}\\) above the axis of the lower half.<br>For either lens half: \\(u = -30\\text{ cm}, f = 20\\text{ cm}\\).<br>\\(\\frac{1}{v} - \\frac{1}{-30} = \\frac{1}{20} \\implies v = +60\\text{ cm}\\).<br>Magnification: \\(m = \\frac{v}{u} = \\frac{60}{-30} = -2\\).<br>For the upper half:<br>Object is \\(1\\text{ mm}\\) below its axis. Image position: \\(y_i = m \\times y_o = (-2) \\times (-1\\text{ mm}) = +2\\text{ mm}\\) (above its axis).<br>So the image is \\(2 + 1 = 3\\text{ mm}\\) above the line of symmetry.<br>By symmetry, the second image is \\(3\\text{ mm}\\) below the line of symmetry.<br>Distance between images: \\(3 - (-3) = 6\\text{ mm}\\)."
            },
            {
                id: 40,
                category: "lensmaker",
                tag: "Displacement Method",
                question: "In a displacement method experiment, the sizes of the images in the two positions of the lens are \\(9\\text{ cm}\\) and \\(4\\text{ cm}\\) respectively. Find the actual size of the object.",
                hint: "The size of the object \\(O\\) is related to conjugate image sizes \\(I_1, I_2\\) by \\(O = \\sqrt{I_1 \\cdot I_2}\\).",
                solution: "Using the conjugate relation for magnification:<br>\\(O = \\sqrt{I_1 I_2}\\)<br>Substitute the values:<br>\\(O = \\sqrt{9 \\times 4} = \\sqrt{36} = 6\\text{ cm}\\)."
            },
            {
                id: 41,
                category: "mirrors",
                tag: "Slab & Mirror",
                question: "A glass slab (\\(\\mu = 1.5\\)) of thickness \\(3\\text{ cm}\\) is placed in front of a concave mirror of focal length \\(10\\text{ cm}\\). An object is placed at a distance of \\(21\\text{ cm}\\) from the mirror. At what distance from the mirror will the final image be formed?",
                hint: "The glass slab shifts the light rays, creating a virtual object for the mirror. Calculate this shift.",
                solution: "Normal shift produced by the slab:<br>\\(\\Delta t = t\\left(1 - \\frac{1}{\\mu}\\right) = 3\\left(1 - \\frac{1}{1.5}\\right) = 3\\left(\\frac{0.5}{1.5}\\right) = 1\\text{ cm}\\).<br>The apparent distance of the object from the mirror is:<br>\\(u' = u - \\Delta t = 21 - 1 = 20\\text{ cm}\\).<br>Since \\(f = -10\\text{ cm}\\), the object is at \\(u' = 20\\text{ cm} = 2f\\) (Center of Curvature).<br>Thus, the mirror forms the image at the Center of Curvature, which is \\(20\\text{ cm}\\) from the mirror. The slab shifts the reflecting rays back, so the final image is formed at its actual position: \\(20\\text{ cm}\\) from the mirror."
            },
            {
                id: 42,
                category: "combinations",
                tag: "Lens-Mirror System",
                question: "A converging lens of focal length \\(20\\text{ cm}\\) and a concave mirror of focal length \\(10\\text{ cm}\\) are coaxially placed \\(50\\text{ cm}\\) apart. A point object is placed midway between them. Find the position of the final image formed by light reflecting first from the mirror and then refracting through the lens.",
                hint: "First find the image formed by the mirror, then use it as the object for the lens.",
                solution: "Object is midway, so \\(u = -25\\text{ cm}\\) from the mirror.<br>Mirror equation:<br>\\(\\frac{1}{v_1} + \\frac{1}{-25} = -\\frac{1}{10} \\implies \\frac{1}{v_1} = -\\frac{1}{10} + \\frac{1}{25} = -\\frac{3}{50} \\implies v_1 = -16.67\\text{ cm}\\) in front of the mirror.<br>Distance of this first image from the lens:<br>\\(u_2 = -(50 - 16.67) = -33.33\\text{ cm}\\) (or \\(-100/3\\text{ cm}\\)).<br>Lens equation:<br>\\(\\frac{1}{v_2} - \\frac{1}{-100/3} = \\frac{1}{20} \\implies \\frac{1}{v_2} + \\frac{3}{100} = \\frac{1}{20}\\)<br>\\(\\frac{1}{v_2} = \\frac{1}{20} - \\frac{3}{100} = \\frac{5 - 3}{100} = \\frac{2}{100} = \\frac{1}{50} \\implies v_2 = +50\\text{ cm}\\).<br>The final image is formed at a distance of \\(50\\text{ cm}\\) behind the lens."
            },
            {
                id: 43,
                category: "combinations",
                tag: "Slab & Lens",
                question: "A point object is placed at the center of a glass beaker filled with water (\\(\\mu = 4/3\\)) up to a height of \\(8\\text{ cm}\\). A convex lens of focal length \\(15\\text{ cm}\\) is placed coaxially \\(10\\text{ cm}\\) above the water surface. Find the position of the final image.",
                hint: "Find the apparent shift of the object due to the water layer, then apply the lens formula.",
                solution: "The object is at the bottom of the beaker (height \\(8\\text{ cm}\\)).<br>Shift due to water: \\(\\Delta y = h\\left(1 - \\frac{1}{\\mu}\\right) = 8\\left(1 - \\frac{3}{4}\\right) = 2\\text{ cm}\\).<br>The apparent position of the object is shifted upwards by \\(2\\text{ cm}\\).<br>Actual object distance from lens = height of water + distance of lens = \\(8 + 10 = 18\\text{ cm}\\).<br>Apparent object distance for lens: \\(u = -(18 - 2) = -16\\text{ cm}\\).<br>Lens equation:<br>\\(\\frac{1}{v} - \\frac{1}{-16} = \\frac{1}{15} \\implies \\frac{1}{v} = \\frac{1}{15} - \\frac{1}{16} = \\frac{1}{240} \\implies v = +240\\text{ cm}\\).<br>The final image is formed at a distance of \\(240\\text{ cm}\\) behind the lens."
            },
            {
                id: 44,
                category: "lensmaker",
                tag: "Displacement Method",
                question: "A screen is placed at a distance of \\(80\\text{ cm}\\) from an object. A convex lens forms a sharp image on the screen at two positions separated by \\(20\\text{ cm}\\). Find the focal length of the lens.",
                hint: "Use \\(f = \\frac{D^2 - d^2}{4D}\\) where \\(D = 80\\text{ cm}\\) and \\(d = 20\\text{ cm}\\).",
                solution: "Using the formula:<br>\\(f = \\frac{D^2 - d^2}{4D}\\)<br>Substitute \\(D = 80\\) and \\(d = 20\\):<br>\\(f = \\frac{80^2 - 20^2}{4 \\times 80} = \\frac{6400 - 400}{320} = \\frac{6000}{320} = 18.75\\text{ cm}\\)."
            },
            {
                id: 45,
                category: "combinations",
                tag: "Lens Combinations",
                question: "A plano-convex lens (\\(\\mu = 1.5, R = 10\\text{ cm}\\)) is placed on a horizontal table with its curved surface in contact with the table. The space between the lens and the table is filled with water (\\(\\mu_w = 4/3\\)). Find the focal length of this combined system.",
                hint: "This behaves as a combination of two lenses: a plano-convex glass lens and a plano-concave water lens.",
                solution: "Glass lens (plano-convex): \\(R_1 = \\infty, R_2 = -10\\text{ cm}\\).<br>\\(\\frac{1}{f_g} = (1.5 - 1)\\left(\\frac{1}{\\infty} - \\frac{1}{-10}\\right) = \\frac{0.5}{10} = \\frac{1}{20}\\text{ cm}^{-1}\\).<br>Water lens (plano-concave): \\(R_1 = -10\\text{ cm}, R_2 = \\infty\\).<br>\\(\\frac{1}{f_w} = (4/3 - 1)\\left(\\frac{1}{-10} - \\frac{1}{\\infty}\\right) = \\frac{1}{3} \\times \\left(-\\frac{1}{10}\\right) = -\\frac{1}{30}\\text{ cm}^{-1}\\).<br>Combined system:<br>\\(\\frac{1}{f_{\\text{eq}}} = \\frac{1}{f_g} + \\frac{1}{f_w} = \\frac{1}{20} - \\frac{1}{30} = \\frac{3 - 2}{60} = \\frac{1}{60} \\implies f_{\\text{eq}} = +60\\text{ cm}\\)."
            },
            {
                id: 46,
                category: "lensmaker",
                tag: "Lens Formula",
                question: "A thin converging lens forms a real image of a point object on its principal axis. If the lens is moved a distance \\(x\\) along the axis, the image moves a distance \\(y\\). Show how these displacements are related to the magnification \\(m\\) of the lens.",
                hint: "Differentiate the lens formula \\(\\frac{1}{v} - \\frac{1}{u} = \\frac{1}{f}\\) with respect to position.",
                solution: "Differentiating \\(\\frac{1}{v} - \\frac{1}{u} = \\frac{1}{f}\\) for a constant focal length \\(f\\):<br>\\(-\\frac{1}{v^2} dv + \\frac{1}{u^2} du = 0 \\implies dv = \\left(\\frac{v}{u}\\right)^2 du\\).<br>Since magnification \\(m = v/u\\), we have:<br>\\(dy = m^2 dx\\).<br>Thus, the image displacement \\(y\\) is related to the lens displacement \\(x\\) by \\(y \\approx m^2 x\\)."
            },
            {
                id: 47,
                category: "plane",
                tag: "Prism Refraction",
                question: "A ray of light is incident at an angle \\(i\\) on one face of a thin prism of small angle \\(A\\) and emerges normally from the opposite face. If the refractive index of the prism is \\(\\mu\\), find the relationship between \\(i\\), \\(A\\), and \\(\\mu\\).",
                hint: "Since the ray emerges normally, the angle of emergence \\(e = 0\\), which implies \\(r_2 = 0\\). Use \\(r_1 + r_2 = A\\).",
                solution: "For normal emergence: \\(e = 0 \\implies r_2 = 0\\).<br>Since \\(r_1 + r_2 = A\\), we have \\(r_1 = A\\).<br>Applying Snell's law at the first face:<br>\\(\\sin i = \\mu \\sin r_1 = \\mu \\sin A\\).<br>For small angles, \\(\\sin i \\approx i\\) and \\(\\sin A \\approx A\\).<br>Therefore, \\(i \\approx \\mu A\\)."
            },
            {
                id: 48,
                category: "spherical",
                tag: "Spherical Refraction",
                question: "A glass rod of refractive index \\(1.5\\) has a hemispherical end of radius of curvature \\(10\\text{ cm}\\). A point object is placed in air at a distance \\(u\\) from the pole. If the image is formed inside the glass at a distance of \\(30\\text{ cm}\\) from the pole, find the value of \\(u\\).",
                hint: "Use \\(\\frac{\\mu_2}{v} - \\frac{\\mu_1}{u} = \\frac{\\mu_2 - \\mu_1}{R}\\) with \\(\\mu_1 = 1, \\mu_2 = 1.5, v = +30\\text{ cm}, R = +10\\text{ cm}\\).",
                solution: "Using the formula: \\(\\frac{1.5}{30} - \\frac{1}{u} = \\frac{1.5 - 1.0}{10}\\)<br>\\(\\frac{1}{20} - \\frac{1}{u} = \\frac{0.5}{10} = \\frac{1}{20}\\)<br>\\(-\\frac{1}{u} = 0 \\implies u \\to -\\infty\\).<br>The object must be placed at infinity."
            },
            {
                id: 49,
                category: "lensmaker",
                tag: "Lens Maker's",
                question: "A convex lens of glass (\\(\\mu_g = 1.5\\)) has a focal length of \\(8\\text{ cm}\\) in air. When immersed in a liquid of refractive index \\(\\mu_l\\), its focal length becomes \\(-32\\text{ cm}\\). Find the value of \\(\\mu_l\\).",
                hint: "Set up the ratio: \\(\\frac{f_l}{f_a} = \\frac{\\mu_g - 1}{\\frac{\\mu_g}{\\mu_l} - 1}\\). Watch the signs.",
                solution: "Given: \\(f_a = 8\\text{ cm}, f_l = -32\\text{ cm}\\).<br>\\(\\frac{-32}{8} = \\frac{1.5 - 1}{\\frac{1.5}{\\mu_l} - 1} \\implies -4 = \\frac{0.5}{\\frac{1.5}{\\mu_l} - 1}\\)<br>\\(\\frac{1.5}{\\mu_l} - 1 = -\\frac{0.5}{4} = -0.125\\)<br>\\(\\frac{1.5}{\\mu_l} = 1 - 0.125 = 0.875 = \\frac{7}{8}\\)<br>\\(\\mu_l = 1.5 \\times \\frac{8}{7} = \\frac{12}{7} \\approx 1.71\\)."
            },
            {
                id: 50,
                category: "combinations",
                tag: "Lens Combinations",
                question: "An equi-convex lens of focal length \\(20\\text{ cm}\\) is cut into two identical halves by a plane passing through its principal axis. The two pieces are then placed in contact with their curved surfaces facing each other. What is the equivalent focal length of the combination?",
                hint: "Each half retains the focal length \\(f = 20\\text{ cm}\\) when cut horizontally. Combining them back-to-back acts as two thin lenses in contact.",
                solution: "Since the lens is cut along the principal axis, each half has focal length \\(f = 20\\text{ cm}\\).<br>When placed in contact, their equivalent focal length \\(f_{\\text{eq}}\\) is:<br>\\(\\frac{1}{f_{\\text{eq}}} = \\frac{1}{f} + \\frac{1}{f} = \\frac{2}{20} = \\frac{1}{10} \\implies f_{\\text{eq}} = 10\\text{ cm}\\)."
            }
        ];

        // Track completed questions in localStorage
        let completedQuestions = JSON.parse(localStorage.getItem('solved_optics_questions')) || {};

        function renderQuestions() {
            const grid = document.getElementById('questions-grid');
            grid.innerHTML = '';
            
            questions.forEach(q => {
                const isChecked = completedQuestions[q.id] ? 'checked' : '';
                const card = document.createElement('article');
                card.className = `card q-card-${q.category}`;
                card.dataset.category = q.category;
                card.dataset.id = q.id;
                card.id = `q-card-${q.id}`;
                
                card.innerHTML = `
                    <div class="card-header">
                        <span class="q-num">Q${q.id}</span>
                        <span class="q-tag">${q.tag}</span>
                    </div>
                    <div class="q-body">
                        ${q.question}
                    </div>
                    
                    <div class="drawer" id="hint-drawer-${q.id}">
                        <div class="drawer-content hint-mode">
                            <strong>Hint:</strong> ${q.hint}
                        </div>
                    </div>
                    
                    <div class="drawer" id="sol-drawer-${q.id}">
                        <div class="drawer-content solution-mode">
                            <strong>Step-by-step Solution:</strong><br>${q.solution}
                        </div>
                    </div>

                    <div class="card-actions">
                        <button class="action-btn" onclick="toggleDrawer('hint-drawer-${q.id}', this)">
                            Show Hint
                        </button>
                        <button class="action-btn" onclick="toggleDrawer('sol-drawer-${q.id}', this)">
                            Show Answer
                        </button>
                        <label class="completed-checkbox">
                            <input type="checkbox" ${isChecked} onchange="toggleComplete(${q.id}, this)">
                            Mark Solved
                        </label>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            if (window.renderMathInElement) {
                renderMathInElement(grid);
            }
            updateTracker();
        }

        function toggleDrawer(id, btn) {
            const drawer = document.getElementById(id);
            const isOpen = drawer.classList.contains('open');
            
            // Close other drawers in the same card
            const card = drawer.closest('.card');
            card.querySelectorAll('.drawer').forEach(d => {
                if (d.id !== id) {
                    d.classList.remove('open');
                }
            });
            card.querySelectorAll('.action-btn').forEach(b => {
                if (b !== btn) {
                    b.classList.remove('active-btn');
                }
            });

            if (isOpen) {
                drawer.classList.remove('open');
                btn.classList.remove('active-btn');
            } else {
                drawer.classList.add('open');
                btn.classList.add('active-btn');
            }
        }

        function toggleComplete(id, checkbox) {
            if (checkbox.checked) {
                completedQuestions[id] = true;
            } else {
                delete completedQuestions[id];
            }
            localStorage.setItem('solved_optics_questions', JSON.stringify(completedQuestions));
            updateTracker();
        }

        function updateTracker() {
            const count = Object.keys(completedQuestions).length;
            document.getElementById('tracker-text').innerText = `${count} / 50 Solved`;
            const pct = (count / 50) * 100;
            document.getElementById('progress-fill').style.width = `${pct}%`;
        }

        function filterCategory(cat, tabBtn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tabBtn.classList.add('active');

            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                if (cat === 'all' || card.dataset.category === cat) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function handleSearch() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                if (text.includes(query)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderQuestions();
        });
    </script>
</body>
</html>
