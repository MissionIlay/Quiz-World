<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refraction Quiz - JEE Advanced Level</title>
    
    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #060713;
            --surface: #101226;
            --border: rgba(255, 255, 255, 0.12);
            --accent-primary: #6366f1;
            --accent-success: #10b981;
            --accent-error: #ef4444;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .workspace {
            flex: 1;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            height: 100vh;
            position: relative;
        }

        header {
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .header-left h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a5b4fc, #6366f1, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-left p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .presenter-controls {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-primary);
        }

        .btn.active {
            background: var(--accent-primary) !important;
            color: white !important;
            border-color: var(--accent-primary) !important;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .btn.danger-btn.active {
            background: var(--accent-error) !important;
            border-color: var(--accent-error) !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .board-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 2rem;
            padding: 2rem;
            align-items: stretch;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        .left-board {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background: rgba(16, 18, 38, 0.4);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            justify-content: flex-start;
            position: relative;
            overflow-y: auto;
            min-height: 0;
        }

        .locked-blur {
            filter: blur(15px);
            pointer-events: none;
            transition: filter 0.3s ease;
        }

        .start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 7, 19, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 8;
            transition: opacity 0.3s ease;
        }

        .start-circle-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), #4f46e5);
            border: 4px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-circle-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 45px rgba(99, 102, 241, 0.6);
            border-color: #fff;
        }

        .q-tag {
            font-size: 1rem;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            padding: 0.4rem 1.2rem;
            border-radius: 9999px;
            width: fit-content;
            font-weight: 700;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .q-title {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.4;
            color: #fff;
        }

        .svg-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .right-board {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            justify-content: flex-start;
            overflow-y: auto;
            padding-right: 0.5rem;
            min-height: 0;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .opt-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .opt-card:hover {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.02);
        }

        .opt-card.correct {
            background: rgba(16, 185, 129, 0.12) !important;
            border-color: var(--accent-success) !important;
            color: #10b981;
        }

        .opt-letter {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--accent-primary);
            margin-right: 1.5rem;
            background: rgba(99, 102, 241, 0.1);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .award-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            display: none;
            flex-direction: column;
            gap: 1rem;
        }

        .award-banner {
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            color: var(--accent-success);
        }

        .award-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }

        .award-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: #fff;
            padding: 0.6rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .award-btn:hover {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .solution-panel {
            background: rgba(16, 18, 129, 0.05);
            border: 2px solid rgba(16, 185, 129, 0.2);
            border-radius: 20px;
            padding: 2rem;
            font-size: 1.15rem;
            line-height: 1.6;
            color: #d1d5db;
            max-height: 350px;
            overflow-y: auto;
        }

        .solution-panel h3 {
            color: var(--accent-success);
            font-size: 1.4rem;
            margin-bottom: 0.75rem;
        }

        .blackboard-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .blackboard-canvas.active {
            pointer-events: auto;
            cursor: crosshair;
        }

        footer {
            background: var(--surface);
            border-top: 2px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .nav-section {
            display: flex;
            gap: 0.5rem;
        }

        .scoreboard {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .score-box {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 12px;
        }

        .score-box .team-lbl {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .score-box .score-val {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-primary);
            min-width: 30px;
            text-align: center;
        }

        .score-adjust {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .score-adjust:hover {
            background: var(--accent-primary);
        }

        svg {
            transform: scale(1.15);
            transform-origin: center;
        }
    </style>
</head>
<body>

    <div class="workspace active">
        <header>
            <div class="header-left">
                <h1>Refraction Quiz (Exam Mode)</h1>
                <p id="question-index-lbl">
                    Question 1 of 15 &bull; 
                    <span id="timer-el" style="color:var(--accent-primary); font-weight:700; margin-right:1rem;">Question Timer: 0s (Worth 10 pts)</span>
                </p>
            </div>
            
            <div class="presenter-controls">
                <button class="btn danger-btn" id="btn-draw" onclick="toggleDrawMode()">Draw Mode (D)</button>
                <button class="btn" onclick="clearCanvas()">Clear Board</button>
            </div>
        </header>

        <main class="board-container">
            <canvas class="blackboard-canvas" id="blackboard"></canvas>

            <div class="left-board" id="left-board-el">
                <div class="start-overlay" id="start-overlay-el">
                    <button class="start-circle-btn" onclick="startQuestionTimer()">START</button>
                </div>

                <div class="locked-blur" id="question-content-el">
                    <div class="q-tag" id="q-tag-el">Snell's Law</div>
                    <div class="q-title" id="q-title-el">
                        Loading...
                    </div>
                    <div class="svg-wrap" id="q-svg-wrap" style="display: none;"></div>
                </div>
            </div>

            <div class="right-board">
                <div class="options-list" id="options-list-el" style="display: none;"></div>

                <div class="award-panel" id="award-panel-el" style="display: none;">
                    <div class="award-banner" id="award-banner-el">Worth 10 Points!</div>
                </div>

                <div class="solution-panel" id="solution-panel-el" style="display: none;">
                    <h3>Step-by-step Solution</h3>
                    <div id="solution-text-el">Solution...</div>
                </div>
            </div>
        </main>

        <footer>
            <div class="nav-section">
                <button class="btn" onclick="location.href='index.html'">Home 🏠</button>
                <button class="btn" onclick="prevQuestion()">&larr; Previous</button>
                <button class="btn" id="next-btn" onclick="nextQuestion()">Next &rarr;</button>
            </div>

            <div class="scoreboard" style="justify-content: flex-end; gap: 2rem;">
                <span class="score-display-total" style="font-size: 1.25rem; font-weight: 700; background: rgba(99,102,241,0.2); padding: 0.5rem 1.5rem; border-radius: 9999px; border: 1px solid rgba(99,102,241,0.4); display: flex; align-items: center; gap: 0.5rem; color: #fff;">
                    Score: <span id="score-total" style="color: #34d399;">0</span> pts
                </span>
            </div>
        </footer>
    </div>

    <!-- Final Score Summary Modal -->
    <div id="summary-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(6,7,19,0.95); z-index:2000; justify-content:center; align-items:center; backdrop-filter:blur(12px);">
        <div style="background:rgba(16,18,38,0.9); border:2px solid rgba(255,255,255,0.15); padding:4rem 3rem; border-radius:24px; max-width:600px; width:90%; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,0.6); position:relative; display:flex; flex-direction:column; gap:2rem; color:#fff; font-family:'Space Grotesk', sans-serif;">
            <h2 style="font-family:'Outfit', sans-serif; font-size:2.5rem; background:linear-gradient(135deg, #a5b4fc, #6366f1, #34d399); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:800; margin-bottom:0.5rem;">Quiz Completed!</h2>
            
            <div style="background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.15); padding:2rem; border-radius:16px; display:flex; flex-direction:column; gap:1rem;">
                <div style="font-size:1.5rem; font-weight:600; color:#c7d2fe;">Your Total Score</div>
                <div style="font-size:3.5rem; font-weight:800; color:#34d399; margin:0.5rem 0;" id="summary-score">0 pts</div>
                <div style="font-size:1.1rem; color:#9ca3af;" id="summary-stats">Accuracy: 0% | Time Taken: 0s</div>
            </div>
            
            <div style="font-size:1.25rem; font-weight:600; line-height:1.6; color:#c7d2fe; padding:0 1rem;" id="summary-message">
                Great job! You finished the exam.
            </div>
            
            <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1rem;">
                <button onclick="location.href='index.html'" style="padding:1rem 2rem; font-size:1.1rem; font-weight:700; background:linear-gradient(135deg, var(--accent-primary), #4f46e5); border:none; color:#fff; border-radius:12px; cursor:pointer; transition:all 0.3s ease; box-shadow:0 4px 15px rgba(99,102,241,0.4);" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">Go Home 🏠</button>
                <button onclick="location.reload()" style="padding:1rem 2rem; font-size:1.1rem; font-weight:700; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); color:#fff; border-radius:12px; cursor:pointer; transition:all 0.3s ease;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'">Retry 🔄</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                id: 1,
                tag: "Snell's Law (Vector Form)",
                question: "A ray of light traveling in air is incident on a glass boundary at \\(y=0\\). The incident ray unit vector is \\(\\hat{u}_i = \\frac{1}{\\sqrt{2}}\\hat{i} - \\frac{1}{\\sqrt{2}}\\hat{j}\\). If the refractive index of the glass is \\(\\mu = \\sqrt{2}\\), find the unit vector along the refracted ray.",
                options: [
                    "\\(\\frac{1}{2}\\hat{i} - \\frac{\\sqrt{3}}{2}\\hat{j}\\)",
                    "\\(\\frac{\\sqrt{3}}{2}\\hat{i} - \\frac{1}{2}\\hat{j}\\)",
                    "\\(\\frac{1}{\\sqrt{2}}\\hat{i} - \\frac{1}{\\sqrt{2}}\\hat{j}\\)",
                    "\\(\\frac{1}{2}\\hat{i} - \\frac{1}{2}\\hat{j}\\)"
                ],
                correctIndex: 0,
                solution: "Let the interface be \\(y=0\\). The unit normal pointing into the refracting medium is \\(\\hat{n} = -\\hat{j}\\).<br>Angle of incidence \\(\\theta_1\\) satisfies:<br>\\(\\cos\\theta_1 = |\\hat{u}_i \\cdot (-\\hat{j})| = \\frac{1}{\\sqrt{2}} \\implies \\theta_1 = 45^\\circ\\).<br>Using Snell's Law:<br>\\(\\mu_1 \\sin\\theta_1 = \\mu_2 \\sin\\theta_2 \\implies 1 \\cdot \\sin 45^\\circ = \\sqrt{2} \\cdot \\sin\\theta_2 \\implies \\sin\\theta_2 = \\frac{1}{2} \\implies \\theta_2 = 30^\\circ\\).<br>The refracted ray unit vector is:<br>\\(\\hat{u}_r = \\sin\\theta_2 \\hat{i} - \\cos\\theta_2 \\hat{j} = \\frac{1}{2}\\hat{i} - \\frac{\\sqrt{3}}{2}\\hat{j}\\).",
                svg: `
                <svg width="220" height="120" viewBox="0 0 220 120">
                    <line x1="10" y1="60" x2="210" y2="60" stroke="#9ca3af" stroke-width="2"/>
                    <line x1="110" y1="10" x2="110" y2="110" stroke="#9ca3af" stroke-dasharray="3" stroke-width="1"/>
                    <text x="15" y="50" fill="#9ca3af" font-size="10">Air (μ=1)</text>
                    <text x="15" y="75" fill="#9ca3af" font-size="10">Glass (μ=√2)</text>
                    <!-- Incident ray -->
                    <line x1="60" y1="10" x2="110" y2="60" stroke="#ef4444" stroke-width="2"/>
                    <polygon points="90,40 85,35 88,44" fill="#ef4444"/>
                    <!-- Refracted ray -->
                    <line x1="110" y1="60" x2="139" y2="110" stroke="#10b981" stroke-width="2"/>
                    <polygon points="122,81 126,85 119,89" fill="#10b981"/>
                </svg>`
            },
            {
                id: 2,
                tag: "Variable Refractive Index",
                question: "A light ray traveling in a medium with refractive index \\(\\mu(y) = \\mu_0\\sqrt{1 + ay}\\) is incident at the origin \\((0,0)\\) at an angle of \\(30^\\circ\\) with the y-axis (vertical). What is the equation of the trajectory of the ray?",
                options: [
                    "\\(x = \\frac{1}{2a}\\left(\\sqrt{3 + 4ay} - \\sqrt{3}\\right)\\)",
                    "\\(x = \\frac{1}{2a}\\left(\\sqrt{4ay - 3} + \\sqrt{3}\\right)\\)",
                    "\\(x = \\frac{1}{a}\\left(\\sqrt{1 + ay} - 1\\right)\\)",
                    "\\(x = \\frac{1}{4a}\\left(\\sqrt{3 + 4ay} - \\sqrt{3}\\right)\\)"
                ],
                correctIndex: 0,
                solution: "By Snell's Law in a stratified medium:<br>\\(\\mu(y) \\sin\\theta(y) = \\text{constant}\\).<br>At \\(y=0\\): \\(\\mu(0) = \\mu_0\\), and \\(\\theta(0) = 30^\\circ\\).<br>\\(\\mu_0 \\sqrt{1 + ay} \\sin\\theta(y) = \\mu_0 \\sin 30^circ = \\frac{\\mu_0}{2}\\)<br>\\(\\sin\\theta(y) = \\frac{1}{2\\sqrt{1 + ay}}\\).<br>Since \\(\\tan\\theta = \\frac{dx}{dy}\\):<br>\\(\\frac{dx}{dy} = \\frac{\\sin\\theta}{\\sqrt{1-\\sin^2\\theta}} = \\frac{1}{\\sqrt{4(1+ay)-1}} = \\frac{1}{\\sqrt{3+4ay}}\\).<br>Integrating: \\(x = \\int_0^y \\frac{dy}{\\sqrt{3+4ay}} = \\left[ \\frac{2}{4a} \\sqrt{3+4ay} \\right]_0^y = \\frac{1}{2a}\\left(\\sqrt{3+4ay} - \\sqrt{3}\\right)\\).",
                svg: `
                <svg width="220" height="120" viewBox="0 0 220 120">
                    <line x1="20" y1="110" x2="200" y2="110" stroke="#9ca3af" stroke-width="1.5"/>
                    <line x1="20" y1="110" x2="20" y2="10" stroke="#9ca3af" stroke-dasharray="3" stroke-width="1"/>
                    <text x="25" y="20" fill="#9ca3af" font-size="9">y (Depth)</text>
                    <text x="185" y="105" fill="#9ca3af" font-size="9">x</text>
                    <!-- Curved ray path -->
                    <path d="M 20 110 Q 70 80 150 40" fill="none" stroke="#6366f1" stroke-width="2"/>
                    <polygon points="85,73 93,73 89,66" fill="#6366f1"/>
                </svg>`
            },
            {
                id: 3,
                tag: "Apparent Depth (Variable Index)",
                question: "A glass slab of thickness \\(H\\) has a variable refractive index given by \\(\\mu(y) = \\mu_0\\left(1 + \\frac{y}{H}\\right)\\), where \\(y\\) is the distance from the top surface. What is the apparent thickness of the slab when viewed normally from the top?",
                options: [
                    "\\(\\frac{H}{\\mu_0} \\ln 2\\)",
                    "\\(\\frac{H}{2\\mu_0}\\)",
                    "\\(\\frac{H}{\\mu_0} (\\ln 2 - 1)\\)",
                    "\\(\\frac{H}{\\mu_0}\\)"
                ],
                correctIndex: 0,
                solution: "For an infinitesimally thin element of thickness \\(dy\\) at depth \\(y\\), the apparent thickness is:<br>\\(dd_{\\text{app}} = \\frac{dy}{\\mu(y)}\\).<br>Integrating from \\(y=0\\) to \\(H\\):<br>\\(d_{\\text{app}} = \\int_0^H \\frac{dy}{\\mu_0(1 + y/H)} = \\frac{H}{\\mu_0} \\left[ \\ln(1 + y/H) \\right]_0^H = \\frac{H}{\\mu_0} \\ln 2\\).",
                svg: null
            },
            {
                id: 4,
                tag: "Apparent Shift & Velocity",
                question: "A glass slab of thickness 3 cm and refractive index 1.5 is placed in front of a stationary plane mirror. A point object in front of the slab is stationary. If the glass slab starts moving towards the mirror with a speed of 2 cm/s, what is the speed of the final image of the object formed by the mirror?",
                options: [
                    "0 cm/s",
                    "2 cm/s",
                    "4 cm/s",
                    "1 cm/s"
                ],
                correctIndex: 0,
                solution: "The apparent shift produced by a slab is \\(S = t\\left(1 - \\frac{1}{\\mu}\\right)\\).<br>Here, \\(S = 3\\left(1 - \\frac{1}{1.5}\\right) = 1\\text{ cm}\\).<br>This shift is independent of the slab's position. Since the object is stationary, its apparent position relative to the mirror remains constant regardless of the slab's motion. Therefore, the image formed by the mirror is stationary, and its speed is 0 cm/s.",
                svg: `
                <svg width="220" height="120" viewBox="0 0 220 120">
                    <!-- Object -->
                    <circle cx="20" cy="60" r="4" fill="#ef4444"/>
                    <text x="12" y="50" fill="#fff" font-size="9">O</text>
                    <!-- Slab -->
                    <rect x="70" y="25" width="40" height="70" fill="#6366f1" opacity="0.4" stroke="#a5b4fc" stroke-width="1.5"/>
                    <text x="75" y="20" fill="#6366f1" font-size="9">v = 2 cm/s</text>
                    <!-- Mirror -->
                    <line x1="170" y1="20" x2="170" y2="100" stroke="#fff" stroke-width="3"/>

        let currentIndex = 0;
        let showOptionsFlag = false;
        let showAnswerFlag = false;
        let showSolutionFlag = false;
        let drawMode = false;

        // Timers & Stats
        let qTimerInterval = null;
        let qSeconds = 0;
        let qTimerRunning = false;
        let calculatedPoints = 10;
        let questionAnswered = false;

        // Scoring Stats
        let totalScore = 0;
        let correctAnswersCount = 0;
        let totalTimeTaken = 0;

        // Canvas Sketching Setup
        const canvas = document.getElementById('blackboard');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#ef4444'; // Red sketching pen
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', () => {
            loadQuestion();
            resizeCanvas();
        });

        // Drawing Logic
        canvas.addEventListener('mousedown', (e) => {
            if (!drawMode) return;
            drawing = true;
            ctx.beginPath();
            ctx.moveTo(e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!drawing || !drawMode) return;
            ctx.lineTo(e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
            ctx.stroke();
        });

        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mouseleave', () => drawing = false);

        canvas.addEventListener('touchstart', (e) => {
            if (!drawMode) return;
            drawing = true;
            const t = e.touches[0];
            ctx.beginPath();
            ctx.moveTo(t.clientX - canvas.getBoundingClientRect().left, t.clientY - canvas.getBoundingClientRect().top);
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!drawing || !drawMode) return;
            const t = e.touches[0];
            ctx.lineTo(t.clientX - canvas.getBoundingClientRect().left, t.clientY - canvas.getBoundingClientRect().top);
            ctx.stroke();
        });

        canvas.addEventListener('touchend', () => drawing = false);

        function toggleDrawMode() {
            drawMode = !drawMode;
            document.getElementById('btn-draw').classList.toggle('active', drawMode);
            canvas.classList.toggle('active', drawMode);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function getPointsForTime(sec) {
            if (sec >= 300) return 0;
            if (sec <= 15) return 10;
            if (sec <= 30) return 9;
            if (sec <= 50) return 8;
            if (sec <= 75) return 7;
            if (sec <= 100) return 6;
            if (sec <= 150) return 5;
            if (sec <= 200) return 4;
            return 3;
        }

        function recalculateTotalScore() {
            totalScore = quizData.reduce((sum, q) => sum + (q.awardedPoints || 0), 0);
            correctAnswersCount = quizData.filter(q => q.answered && q.selectedOptionIndex === q.correctIndex).length;
            document.getElementById('score-total').innerText = totalScore;
        }

        function startQuestionTimer() {
            const q = quizData[currentIndex];
            if (q.answered) return;

            document.getElementById('start-overlay-el').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-overlay-el').style.display = 'none';
            }, 300);
            document.getElementById('question-content-el').classList.remove('locked-blur');

            showOptionsFlag = true;
            applyDisplayStates();
            
            setTimeout(() => {
                const rb = document.querySelector('.right-board');
                if (rb) rb.scrollTo({ top: 0, behavior: 'smooth' });
            }, 100);

            qSeconds = 0;
            qTimerRunning = true;
            calculatedPoints = 10;
            
            document.getElementById('timer-el').innerText = `Question Timer: 0s (Worth 10 pts)`;
            qTimerInterval = setInterval(() => {
                qSeconds++;
                totalTimeTaken++;
                
                calculatedPoints = getPointsForTime(qSeconds);
                
                document.getElementById('timer-el').innerText = `Question Timer: ${qSeconds}s (Worth ${calculatedPoints} pts)`;
                
                if (qSeconds >= 300) {
                    clearInterval(qTimerInterval);
                    qTimerRunning = false;
                    calculatedPoints = 0;
                    
                    q.answered = true;
                    q.selectedOptionIndex = null;
                    q.awardedPoints = 0;
                    q.timeTaken = 300;
                    
                    showAnswerFlag = true;
                    showSolutionFlag = true;
                    applyDisplayStates();
                    
                    document.querySelectorAll('.opt-card').forEach(el => el.style.pointerEvents = 'none');
                    
                    document.getElementById('award-banner-el').innerText = `Time's Up! 0 Points.`;
                    document.getElementById('award-panel-el').style.display = 'flex';
                    
                    recalculateTotalScore();
                }
            }, 1000);
        }

        function loadQuestion() {
            clearCanvas();
            clearInterval(qTimerInterval);
            qTimerRunning = false;
            qSeconds = 0;
            calculatedPoints = 10;
            
            quizData.forEach(item => {
                if (item.answered === undefined) {
                    item.answered = false;
                    item.selectedOptionIndex = null;
                    item.awardedPoints = 0;
                    item.timeTaken = 0;
                }
            });

            const q = quizData[currentIndex];
            
            recalculateTotalScore();
            document.getElementById('award-panel-el').style.display = 'none';

            const lb = document.querySelector('.left-board');
            if (lb) lb.scrollTop = 0;
            const rb = document.querySelector('.right-board');
            if (rb) rb.scrollTop = 0;

            document.getElementById('question-index-lbl').innerHTML = `
                Question ${currentIndex + 1} of ${quizData.length} &bull; 
                <span id="timer-el" style="color:var(--accent-primary); font-weight:700; margin-right:1rem;">Question Timer: 0s (Worth 10 pts)</span>
            `;
            document.getElementById('q-tag-el').innerText = q.tag;
            document.getElementById('q-title-el').innerHTML = q.question;

            const svgWrap = document.getElementById('q-svg-wrap');
            if (q.svg) {
                svgWrap.innerHTML = q.svg;
                svgWrap.style.display = 'flex';
            } else {
                svgWrap.style.display = 'none';
            }

            const optionsList = document.getElementById('options-list-el');
            optionsList.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const card = document.createElement('div');
                card.className = 'opt-card';
                card.id = `opt-${idx}`;
                
                let optHtml = `<span>${opt}</span>`;
                if (opt.endsWith('.png') || opt.endsWith('.jpg')) {
                    let optSrc = opt;
                    if (window.location.pathname.includes('Quiz World Site')) {
                        optSrc = `../Optics /${opt}`;
                    }
                    optHtml = `<img src="${optSrc}" alt="Option ${String.fromCharCode(65 + idx)}" style="max-height: 80px; max-width: 100%; border-radius: 8px; filter: invert(1) hue-rotate(180deg); margin-left: 0.5rem; opacity: 0.9;">`;
                }

                card.innerHTML = `
                    <span class="opt-letter">${String.fromCharCode(65 + idx)}</span>
                    ${optHtml}
                `;
                card.onclick = () => {
                    if (q.answered) return;
                    q.answered = true;
                    q.selectedOptionIndex = idx;
                    q.timeTaken = qSeconds;
                    
                    clearInterval(qTimerInterval);
                    qTimerRunning = false;
                    
                    document.querySelectorAll('.opt-card').forEach(el => el.style.pointerEvents = 'none');
                    
                    if (idx === q.correctIndex) {
                        q.awardedPoints = calculatedPoints;
                        card.classList.add('correct');
                        document.getElementById('award-banner-el').innerText = `Correct! +${calculatedPoints} Points.`;
                    } else {
                        q.awardedPoints = 0;
                        card.classList.add('incorrect');
                        const correctCard = document.getElementById(`opt-${q.correctIndex}`);
                        if (correctCard) correctCard.classList.add('correct');
                        document.getElementById('award-banner-el').innerText = `Incorrect! 0 Points.`;
                    }
                    
                    recalculateTotalScore();
                    
                    showAnswerFlag = true;
                    showSolutionFlag = true;
                    applyDisplayStates();
                    
                    document.getElementById('award-panel-el').style.display = 'flex';
                    
                    setTimeout(() => {
                        const rb = document.querySelector('.right-board');
                        if (rb) rb.scrollTo({ top: rb.scrollHeight, behavior: 'smooth' });
                    }, 100);
                };
                optionsList.appendChild(card);
            });

            document.getElementById('solution-text-el').innerHTML = q.solution;

            if (q.answered) {
                document.getElementById('start-overlay-el').style.display = 'none';
                document.getElementById('question-content-el').classList.remove('locked-blur');
                showOptionsFlag = true;
                showAnswerFlag = true;
                showSolutionFlag = true;
                applyDisplayStates();
                
                document.querySelectorAll('.opt-card').forEach(el => el.style.pointerEvents = 'none');
                
                if (q.selectedOptionIndex !== null) {
                    const selectedCard = document.getElementById(`opt-${q.selectedOptionIndex}`);
                    if (selectedCard) {
                        if (q.selectedOptionIndex === q.correctIndex) {
                            selectedCard.classList.add('correct');
                        } else {
                            selectedCard.classList.add('incorrect');
                        }
                    }
                }
                const correctCard = document.getElementById(`opt-${q.correctIndex}`);
                if (correctCard) correctCard.classList.add('correct');
                
                if (q.selectedOptionIndex === null) {
                    document.getElementById('award-banner-el').innerText = `Time's Up! 0 Points.`;
                } else if (q.selectedOptionIndex === q.correctIndex) {
                    document.getElementById('award-banner-el').innerText = `Correct! +${q.awardedPoints} Points.`;
                } else {
                    document.getElementById('award-banner-el').innerText = `Incorrect! 0 Points.`;
                }
                document.getElementById('award-panel-el').style.display = 'flex';
                document.getElementById('timer-el').innerText = `Answered in ${q.timeTaken}s (Worth ${q.awardedPoints} pts)`;
            } else {
                document.getElementById('start-overlay-el').style.display = 'flex';
                document.getElementById('start-overlay-el').style.opacity = '1';
                document.getElementById('question-content-el').classList.add('locked-blur');
                resetFlags();
                applyDisplayStates();
            }
            
            if (window.renderMathInElement) {
                renderMathInElement(document.querySelector('.board-container'));
            }
            
            if (currentIndex === quizData.length - 1) {
                document.getElementById('next-btn').innerHTML = `Finish &check;`;
            } else {
                document.getElementById('next-btn').innerHTML = `Next &rarr;`;
            }
        }

        function applyDisplayStates() {
            document.getElementById('options-list-el').style.display = showOptionsFlag ? 'flex' : 'none';
            document.getElementById('solution-panel-el').style.display = showSolutionFlag ? 'block' : 'none';

            const q = quizData[currentIndex];
            if (showAnswerFlag) {
                const optEl = document.getElementById(`opt-${q.correctIndex}`);
                if (optEl) optEl.classList.add('correct');
            } else {
                document.querySelectorAll('.opt-card').forEach(el => el.classList.remove('correct'));
            }
        }

        // Navigation
        function nextQuestion() {
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                resetFlags();
                loadQuestion();
            } else {
                showSummaryScreen();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                resetFlags();
                loadQuestion();
            }
        }

        function resetFlags() {
            showOptionsFlag = false;
            showAnswerFlag = false;
            showSolutionFlag = false;
        }

        function showSummaryScreen() {
            clearInterval(qTimerInterval);
            qTimerRunning = false;
            
            let accuracy = Math.round((correctAnswersCount / quizData.length) * 100);
            
            document.getElementById('summary-score').innerText = `${totalScore} pts`;
            document.getElementById('summary-stats').innerText = `Accuracy: ${accuracy}% | Total Time: ${totalTimeTaken}s`;
            
            let message = "";
            if (accuracy >= 80) {
                message = "Outstanding! You have mastered this chapter. Perfect score potential! 🌟";
            } else if (accuracy >= 50) {
                message = "Good job! You've successfully completed the exam. Keep practicing to improve! 👍";
            } else {
                message = "Keep studying! Try reviewing the solutions and retaking the exam to boost your score. 💪";
            }
            document.getElementById('summary-message').innerText = message;
            document.getElementById('summary-modal').style.display = 'flex';
        }

        // Keyboard Shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextQuestion();
            } else if (e.key === 'ArrowLeft') {
                prevQuestion();
            } else if (e.key.toLowerCase() === 'd') {
                toggleDrawMode();
            }
        });
    </script>
</body>
</html>
